<div class="admin-abm-container">
  <h2>Gestión de Alianzas</h2>

  <div class="form-container">
    <h3>{{ isEditing ? 'Editar Alianza' : 'Nueva Alianza' }}</h3>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" [(ngModel)]="currentAlianza.nombre" name="nombre" required>
      </div>
      <div class="form-group">
        <label for="logoUrl">URL del Logo</label>
        <input type="text" id="logoUrl" [(ngModel)]="currentAlianza.logoUrl" name="logoUrl">
      </div>
      <div class="form-group">
        <label for="urlSitio">URL del Sitio Web</label>
        <input type="text" id="urlSitio" [(ngModel)]="currentAlianza.urlSitio" name="urlSitio">
      </div>
      <div class="form-group checkbox-group">
        <label for="activo">Activo</label>
        <input type="checkbox" id="activo" [(ngModel)]="currentAlianza.activo" name="activo">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="!currentAlianza.nombre">
          {{ isEditing ? 'Actualizar' : 'Crear' }}
        </button>
        <button type="button" class="btn-secondary" (click)="resetForm()" *ngIf="isEditing">Cancelar</button>
      </div>
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    </form>
  </div>

  <div class="list-container">
    <h3>Lista de Alianzas</h3>
    <div *ngIf="isLoading" class="loading">Cargando...</div>
    <table class="data-table" *ngIf="!isLoading">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Logo</th>
          <th>Sitio Web</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let alianza of alianzas">
          <td>{{ alianza.id }}</td>
          <td>{{ alianza.nombre }}</td>
          <td><img [src]="alianza.logoUrl" alt="logo" style="height: 30px;" *ngIf="alianza.logoUrl"></td>
          <td><a [href]="alianza.urlSitio" target="_blank" *ngIf="alianza.urlSitio">Visitar</a></td>
          <td>{{ alianza.activo ? 'Activo' : 'Inactivo' }}</td>
          <td class="actions-cell">
            <button class="btn-edit" (click)="editAlianza(alianza)">Editar</button>
            <button class="btn-delete" (click)="deleteAlianza(alianza.id)">Eliminar</button>
          </td>
        </tr>
        <tr *ngIf="alianzas.length === 0">
          <td colspan="6" class="text-center">No hay alianzas registradas.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
